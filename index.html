<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login & Register Account - App">
    <title>Account</title>
    <link rel="shortcut icon" href="./library/images/favicon_32.png" sizes="32x32" type="image/x-icon">
    <link rel="shortcut icon" href="./library/images/favicon_64.png" sizes="64x64" type="image/x-icon">
    <link rel="stylesheet" href="./library/styles/reset.css">
    <link rel="stylesheet" href="./library/globals.css">
    <link rel="stylesheet" href="./library/styles/main.css">
    <link rel="stylesheet" href="./library/styles/media.css">
</head>

<body>

    <noscript>
        <div class="noscript__message">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" class="noscript__image" height="20px" width="20px">
                <path d="M819.93-53.59 280.2-593.09 169.35-482.24l197 197-48.98 48.98L71.39-482l160.07-159.83-177.87-178.1 44.67-44.68L864.61-98.26l-44.68 44.67Zm-90.52-269.45-48.74-48.74 110.22-109.98-197-197 48.74-48.98L888.61-482l-159.2 158.96Z" />
            </svg>
            <span class="noscript__text">Make sure JavaScript is enabled</span>
        </div>
    </noscript>

    <div class="wrapper">
        <img src="./library/images/objects/ellipse_1.svg" alt="" class="figure--elipse figure" height="279" width="314">
        <img src="./library/images/objects/ellipse_2.svg" alt="" class="figure--elipse figure" height="325" width="405">
        <img src="./library/images/objects/rectangle_1.svg" alt="" class="figure--rectangle figure" height="352" width="137">
        <img src="./library/images/objects/rectangle_2.svg" alt="" class="figure--rectangle figure" height="292" width="66">
    </div>

    <main class="main">
        <section class="account is-visible" id="account">
            <div class="account__container container">
                <img src="./library/images/illustrations/work_from_home.svg" alt="Work from home illustration" class="account__image" height="370" width="363">
                <div class="account__body">
                    <div class="account__descriptions">
                        <h1 class="account__title title--color">Discover Your Dream Job here</h1>
                        <p class="account__subtitle">Explore all the existing job roles based on your interest and study major</p>
                    </div>
                    <div class="account__actions">
                        <button type="button" class="button button--login button--fill" id="button-login">Login</button>
                        <button type="button" class="button button--register button--transparent" id="button-register">Register</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="login is-hidden" id="login">
            <div class="login__container container">
                <div class="login__descriptions">
                    <h2 class="login__title title--color">Login here</h2>
                    <p class="login__subtitle">Welcome back you’ve been missed!</p>
                </div>
                <form class="login__form">
                    <div class="input-inner">
                        <input type="email" name="login-user-email" class="input-inner__input" id="login-user-email" placeholder=" " required>
                        <label class="input-inner__label" for="login-user-email">Email</label>
                    </div>
                    <div class="input-inner">
                        <input type="password" name="login-user-password" class="input-inner__input" id="login-user-password" minlength="8" placeholder=" " required>
                        <label class="input-inner__label" for="login-user-password">Password</label>
                    </div>
                    <a href="#!" class="login__forgot-link link">Forgot your password?</a>
                    <button type="submit" class="button button--sign-in button--fill" id="button-sign-in">Sign in</button>
                    <button type="button" class="button button--new-account button--transparent" id="button-new-account">Create new account</button>
                </form>
                <nav class="link-inner">
                    <span class="link-inner__text link">Or continue with</span>
                    <div class="link-inner__body">
                        <button type="button" class="button button--link button--fill-link">
                            <img src="./library/images/logos/google.svg" alt="" height="24" width="24">
                        </button>
                        <button type="button" class="button button--link button--fill-link">
                            <img src="./library/images/logos/facebook.svg" alt="" height="24" width="24">
                        </button>
                        <button type="button" class="button button--link button--fill-link">
                            <img src="./library/images/logos/apple.svg" alt="" height="24" width="24">
                        </button>
                    </div>
                </nav>
            </div>
        </section>

        <section class="register is-hidden" id="register">
            <div class="register__container container">
                <div class="register__descriptions">
                    <h2 class="register__title title--color">Create Account</h2>
                    <p class="register__subtitle">Create an account so you can explore all the existing jobs</p>
                </div>
                <form class="register__form">
                    <div class="register__form-inner">
                        <div class="input-inner">
                            <input type="email" name="register-user-email" class="input-inner__input" id="register-user-email" placeholder=" " required>
                            <label class="input-inner__label" for="register-user-email">Email</label>
                        </div>
                        <div class="input-inner">
                            <input type="password" name="register-user-password" class="input-inner__input" id="register-user-password" minlength="8" placeholder=" " required>
                            <label class="input-inner__label" for="register-user-password">Password</label>
                        </div>
                        <div class="input-inner">
                            <input type="password" name="register-user-confirm-password" class="input-inner__input" id="register-user-confirm-password" minlength="8" placeholder=" " required>
                            <label class="input-inner__label" for="register-user-confirm-password">Confirm password</label>
                        </div>
                    </div>
                    <button type="submit" class="button button--sign-up button--fill" id="button-sign-up">Sign up</button>
                    <button type="button" class="button button--have-account button--transparent" id="button-have-account">Already have an account</button>
                </form>
                <nav class="link-inner">
                    <span class="link-inner__text link">Or continue with</span>
                    <div class="link-inner__body">
                        <button type="button" class="button button--link button--fill-link">
                            <img src="./library/images/logos/google.svg" alt="" height="24" width="24">
                        </button>
                        <button type="button" class="button button--link button--fill-link">
                            <img src="./library/images/logos/facebook.svg" alt="" height="24" width="24">
                        </button>
                        <button type="button" class="button button--link button--fill-link">
                            <img src="./library/images/logos/apple.svg" alt="" height="24" width="24">
                        </button>
                    </div>
                </nav>
            </div>
        </section>

    </main>

    <script src="./library/scripts/visual_toggle_button.js"></script>

</body>

</html>
